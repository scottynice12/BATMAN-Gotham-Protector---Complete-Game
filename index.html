<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BATMAN: Gotham Brawler 🦇 | Real Fighting Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        canvas {
            border: 4px solid #ffd700;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            background: #0a0a2a;
            cursor: pointer;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-panel {
            background: rgba(0,0,0,0.85);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            font-family: monospace;
            color: #ffd700;
            font-weight: bold;
            font-size: 14px;
        }

        .stat-panel span {
            color: white;
            font-size: 1.3rem;
            margin-left: 8px;
        }

        .timer-panel {
            background: rgba(0,0,0,0.85);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            font-family: monospace;
            color: #ffd700;
            font-weight: bold;
        }

        .timer-panel span {
            color: #ff4444;
            font-size: 1.5rem;
            margin-left: 8px;
            font-weight: bold;
        }

        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
        }

        .controls kbd {
            background: #222;
            padding: 3px 8px;
            border-radius: 5px;
            color: #ffd700;
            margin: 0 3px;
            font-weight: bold;
        }

        .restart-btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            background: #ffed4a;
        }

        @media (max-width: 900px) {
            .stat-panel, .timer-panel { font-size: 10px; padding: 5px 10px; }
            .stat-panel span, .timer-panel span { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="stat-panel">🏆 SCORE <span id="score">0</span></div>
        <div class="stat-panel">📍 LEVEL <span id="level">1</span></div>
        <div class="timer-panel">⏱️ TIME <span id="timer">180</span>s</div>
        <div class="stat-panel">🤝 SIDEKICK <span id="sidekick">⚫ None</span></div>
        <div class="stat-panel">❤️ HP <span id="health">100</span>/100</div>
    </div>
    <canvas id="gameCanvas" width="1100" height="550"></canvas>
    <div class="controls">
        🎮 <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;| <kbd>A</kbd> Punch (10 dmg) &nbsp;| <kbd>S</kbd> Kick (15 dmg) &nbsp;|
        <kbd>D</kbd> Sidekick &nbsp;| <kbd>SPACE</kbd> Block &nbsp;| Villain HP: <span id="villainHp">100</span>
    </div>
    <button class="restart-btn" onclick="restartGame()">🔄 RESTART GAME</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ========== GAME STATE ==========
    let score = 0;
    let currentLevel = 1;
    let gameRunning = true;
    let frame = 0;
    let attackCooldown = 0;
    let sidekickCooldown = 0;
    let damageFlash = 0;
    let invincibleFrames = 0;
    let blockActive = false;
    let blockTimer = 0;
    
    // ========== TIMER SYSTEM (3 MINUTES = 180 SECONDS) ==========
    let timeLeft = 180; // 3 minutes!
    let timerInterval = null;
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameRunning) return;
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                
                // Flash red when 30 seconds left
                if (timeLeft <= 30) {
                    document.getElementById('timer').style.color = '#ff0000';
                }
                
                // TIME'S UP! Win if time runs out
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameRunning = false;
                    showFloatingText('🎉 TIME\'S UP! YOU WIN! 🎉', canvas.width/2, 200, '#ffd700');
                    score += currentLevel * 500;
                    updateUI();
                }
            }
        }, 1000);
    }
    
    // ========== SIDEKICKS ==========
    const SIDEKICKS = {
        0: { name: 'None', emoji: '⚫', color: '#666', damage: 0 },
        1: { name: 'Robin', emoji: '🤸', color: '#44ff44', damage: 20 },
        2: { name: 'Batgirl', emoji: '🦸‍♀️', color: '#ff69b4', damage: 30 },
        3: { name: 'Nightwing', emoji: '⚡', color: '#44aaff', damage: 40 }
    };
    let currentSidekick = 0;
    
    // ========== VILLAINS (BALANCED FOR 3 MIN FIGHTS) ==========
    const VILLAINS = {
        1: { name: 'Scarecrow', health: 180, maxHealth: 180, damage: 6, color: '#8B4513', emoji: '🌾', phrase: 'Fear me!' },
        2: { name: 'Hush', health: 200, maxHealth: 200, damage: 7, color: '#2F4F4F', emoji: '🩺', phrase: 'Your life is mine!' },
        3: { name: 'Riddler', health: 190, maxHealth: 190, damage: 6, color: '#006400', emoji: '❓', phrase: 'Riddle me this!' },
        4: { name: 'Clayface', health: 250, maxHealth: 250, damage: 8, color: '#8B6914', emoji: '🧱', phrase: 'I am everywhere!' },
        5: { name: 'Mr Freeze', health: 220, maxHealth: 220, damage: 7, color: '#00BFFF', emoji: '❄️', phrase: 'Freeze!' },
        6: { name: 'Joker', health: 280, maxHealth: 280, damage: 9, color: '#9400D3', emoji: '🃏', phrase: 'Why so serious?' }
    };
    
    let currentVillain = JSON.parse(JSON.stringify(VILLAINS[1]));
    document.getElementById('villainHp').innerText = currentVillain.health;
    
    // ========== PLAYER ==========
    const player = {
        x: 150,
        y: canvas.height - 110,
        width: 48,
        height: 48,
        health: 100,
        maxHealth: 100,
        isAttacking: false,
        attackTimer: 0,
        facingRight: true,
        attackType: ''
    };
    
    // ========== VILLAIN ==========
    const villain = {
        x: canvas.width - 200,
        y: canvas.height - 110,
        width: 52,
        height: 52,
        moveDirection: -1,
        moveTimer: 0,
        isAttacking: false,
        attackTimer: 0,
        attackCooldown: 0
    };
    
    // ========== UI UPDATES ==========
    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = currentLevel;
        document.getElementById('health').innerText = player.health;
        document.getElementById('villainHp').innerText = currentVillain.health;
        document.getElementById('sidekick').innerHTML = SIDEKICKS[currentSidekick].emoji + ' ' + SIDEKICKS[currentSidekick].name;
    }
    
    // ========== CHECK SIDEKICK UNLOCK ==========
    function checkSidekickUnlock() {
        if (currentLevel >= 2 && currentSidekick === 0) {
            currentSidekick = 1;
            showFloatingText(`✨ ${SIDEKICKS[1].name} JOINED! ✨`, canvas.width/2, 100, '#44ff44');
        }
        if (currentLevel >= 4 && currentSidekick === 1) {
            currentSidekick = 2;
            showFloatingText(`✨ ${SIDEKICKS[2].name} JOINED! ✨`, canvas.width/2, 100, '#ff69b4');
        }
        if (currentLevel >= 6 && currentSidekick === 2) {
            currentSidekick = 3;
            showFloatingText(`✨ ${SIDEKICKS[3].name} JOINED! ✨`, canvas.width/2, 100, '#44aaff');
        }
        updateUI();
    }
    
    // ========== ATTACKS ==========
    function punch() {
        if (!gameRunning) return;
        if (attackCooldown > 0) return;
        if (player.isAttacking) return;
        
        player.isAttacking = true;
        player.attackType = 'punch';
        player.attackTimer = 10;
        attackCooldown = 20;
        
        const distance = Math.abs(player.x - villain.x);
        if (distance < 90) {
            const damage = 10;
            currentVillain.health -= damage;
            score += 10;
            updateUI();
            showFloatingText(`PUNCH! -${damage}`, villain.x + 20, villain.y - 20, '#ffaa44');
            screenShake(3);
            
            if (currentVillain.health <= 0) {
                defeatVillain();
            }
        } else {
            showFloatingText('MISS!', player.x + 20, player.y - 30, '#ff6666');
        }
    }
    
    function kick() {
        if (!gameRunning) return;
        if (attackCooldown > 0) return;
        if (player.isAttacking) return;
        
        player.isAttacking = true;
        player.attackType = 'kick';
        player.attackTimer = 12;
        attackCooldown = 25;
        
        const distance = Math.abs(player.x - villain.x);
        if (distance < 90) {
            const damage = 15;
            currentVillain.health -= damage;
            score += 15;
            updateUI();
            showFloatingText(`KICK! -${damage}`, villain.x + 20, villain.y - 20, '#ff8844');
            screenShake(4);
            
            if (currentVillain.health <= 0) {
                defeatVillain();
            }
        } else {
            showFloatingText('MISS!', player.x + 20, player.y - 30, '#ff6666');
        }
    }
    
    function block() {
        if (!gameRunning) return;
        if (blockTimer > 0) return;
        blockActive = true;
        blockTimer = 20;
        showFloatingText('🛡️ BLOCK!', player.x, player.y - 30, '#88aaff');
    }
    
    function callSidekick() {
        if (!gameRunning) return;
        if (currentSidekick === 0) {
            showFloatingText('Unlock at Level 2!', canvas.width/2, 150, '#ffaa00');
            return;
        }
        if (sidekickCooldown > 0) {
            showFloatingText(`Ready in ${Math.ceil(sidekickCooldown/30)}s`, canvas.width/2, 150, '#ffaa00');
            return;
        }
        
        sidekickCooldown = 90; // 3 second cooldown at 30fps
        const damage = SIDEKICKS[currentSidekick].damage;
        currentVillain.health -= damage;
        score += 25;
        updateUI();
        showFloatingText(`${SIDEKICKS[currentSidekick].name} ASSIST! -${damage}!`, villain.x + 20, villain.y - 50, SIDEKICKS[currentSidekick].color);
        screenShake(5);
        
        if (currentVillain.health <= 0) {
            defeatVillain();
        }
    }
    
    // ========== SCREEN SHAKE ==========
    let shakeAmount = 0;
    function screenShake(amount) {
        shakeAmount = amount;
    }
    
    // ========== VILLAIN AI - FIGHTS BACK! ==========
    function villainAttack() {
        if (!gameRunning) return;
        if (villain.attackCooldown > 0) {
            villain.attackCooldown--;
            return;
        }
        
        const distance = Math.abs(player.x - villain.x);
        if (distance < 100 && !villain.isAttacking) {
            villain.isAttacking = true;
            villain.attackTimer = 15;
            villain.attackCooldown = 40;
            
            setTimeout(() => {
                if (!gameRunning) return;
                const currentDistance = Math.abs(player.x - villain.x);
                if (currentDistance < 100) {
                    if (blockActive) {
                        showFloatingText('BLOCKED!', player.x + 20, player.y - 30, '#88ff88');
                        blockActive = false;
                    } else if (invincibleFrames <= 0) {
                        const damage = currentVillain.damage;
                        player.health -= damage;
                        damageFlash = 15;
                        invincibleFrames = 25;
                        updateUI();
                        showFloatingText(`-${damage}!`, player.x + 20, player.y - 20, '#ff4444');
                        screenShake(4);
                        
                        if (player.health <= 0) {
                            gameRunning = false;
                            if (timerInterval) clearInterval(timerInterval);
                            showFloatingText('💀 GAME OVER 💀', canvas.width/2, 200, '#ff0000');
                        }
                    }
                }
                villain.isAttacking = false;
            }, 350);
        }
    }
    
    // ========== VILLAIN MOVEMENT ==========
    function updateVillainMovement() {
        if (!gameRunning) return;
        villain.moveTimer++;
        if (villain.moveTimer > 60) {
            villain.moveDirection *= -1;
            villain.moveTimer = 0;
        }
        let newX = villain.x + (villain.moveDirection * 1.0);
        if (newX > canvas.width - 120) newX = canvas.width - 120;
        if (newX < canvas.width - 380) newX = canvas.width - 380;
        villain.x = newX;
    }
    
    // ========== DEFEAT VILLAIN / NEXT LEVEL ==========
    function defeatVillain() {
        const levelBonus = currentLevel * 200;
        score += levelBonus;
        updateUI();
        showFloatingText(`⭐ VICTORY! +${levelBonus} ⭐`, canvas.width/2, 150, '#ffd700');
        screenShake(8);
        
        if (currentLevel < 6) {
            currentLevel++;
            checkSidekickUnlock();
            
            // Reset for next level
            currentVillain = JSON.parse(JSON.stringify(VILLAINS[currentLevel]));
            villain.x = canvas.width - 200;
            // Heal player partially
            player.health = Math.min(player.health + 30, player.maxHealth);
            updateUI();
            showFloatingText(`⚔️ LEVEL ${currentLevel}: ${currentVillain.name}! ⚔️`, canvas.width/2, 80, '#ffaa00');
            
            // Add extra time for next level (30 seconds bonus)
            timeLeft += 30;
            document.getElementById('timer').innerText = timeLeft;
        } else {
            // WIN THE GAME!
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            showFloatingText('🏆 YOU DEFEATED ALL VILLAINS! 🏆', canvas.width/2, 180, '#ffd700');
            showFloatingText(`FINAL SCORE: ${score}`, canvas.width/2, 240, '#ffffff');
        }
    }
    
    // ========== UPDATE GAME ==========
    let floatingTexts = [];
    
    function showFloatingText(text, x, y, color) {
        floatingTexts.push({ text, x, y, color, life: 50 });
    }
    
    function updateGame() {
        if (!gameRunning) return;
        
        frame++;
        if (attackCooldown > 0) attackCooldown--;
        if (sidekickCooldown > 0) sidekickCooldown--;
        if (damageFlash > 0) damageFlash--;
        if (invincibleFrames > 0) invincibleFrames--;
        if (blockTimer > 0) {
            blockTimer--;
            if (blockTimer <= 0) blockActive = false;
        }
        if (player.attackTimer > 0) player.attackTimer--;
        else player.isAttacking = false;
        if (shakeAmount > 0) shakeAmount--;
        
        // Update floating texts
        for (let i = 0; i < floatingTexts.length; i++) {
            floatingTexts[i].life--;
            floatingTexts[i].y -= 1;
            if (floatingTexts[i].life <= 0) {
                floatingTexts.splice(i, 1);
                i--;
            }
        }
        
        // Player movement
        const keys = window.keys || {};
        if (keys.ArrowLeft && player.x > 60) {
            player.x -= 5;
            player.facingRight = false;
        }
        if (keys.ArrowRight && player.x < canvas.width - 250) {
            player.x += 5;
            player.facingRight = true;
        }
        
        updateVillainMovement();
        villainAttack();
    }
    
    // ========== DRAW EVERYTHING ==========
    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#0a0a2a');
        grad.addColorStop(1, '#1a1a3a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Gotham skyline
        ctx.fillStyle = '#152238';
        for (let i = 0; i < 14; i++) {
            ctx.fillRect(30 + i * 85, canvas.height - 90 - (40 + Math.sin(i) * 30), 40, 40 + Math.sin(i) * 30);
            ctx.fillStyle = '#ffaa33';
            for (let w = 0; w < 2; w++) {
                ctx.fillRect(40 + i * 85 + w * 15, canvas.height - 80 - (40 + Math.sin(i) * 30) + w * 20, 5, 8);
            }
            ctx.fillStyle = '#152238';
        }
        
        // Moon
        ctx.fillStyle = '#ffddaa';
        ctx.beginPath();
        ctx.arc(100, 80, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0a0a2a';
        ctx.beginPath();
        ctx.arc(120, 70, 35, 0, Math.PI * 2);
        ctx.fill();
        
        // Ground
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
        ctx.fillStyle = '#ffd700';
        ctx.font = "bold 12px monospace";
        ctx.fillText("GOTHAM CITY ARENA", canvas.width/2 - 80, canvas.height - 15);
    }
    
    function drawBatman() {
        const px = player.x;
        const py = player.y;
        
        if (invincibleFrames > 0 && (Math.floor(Date.now() / 50) % 2 === 0)) {
            ctx.globalAlpha = 0.5;
        }
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(px + 8, py + 48, 35, 6);
        
        // Cape
        ctx.fillStyle = '#1a1a3a';
        ctx.fillRect(px - (player.facingRight ? 10 : 5), py + 20, 14, 28);
        
        // Body
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(px + 10, py + 25, 30, 24);
        
        // Bat symbol
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(px + 21, py + 33, 8, 6);
        
        // Belt
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(px + 10, py + 45, 30, 4);
        
        // Head
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(px + 14, py + 10, 22, 18);
        
        // Ears
        ctx.fillRect(px + 16, py + 2, 5, 12);
        ctx.fillRect(px + 29, py + 2, 5, 12);
        
        // Eyes
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px + 18, py + 15, 6, 5);
        ctx.fillRect(px + 26, py + 15, 6, 5);
        
        // Pupils
        ctx.fillStyle = '#000000';
        ctx.fillRect(px + (player.facingRight ? 22 : 19), py + 16, 2, 3);
        ctx.fillRect(px + (player.facingRight ? 30 : 27), py + 16, 2, 3);
        
        // Block stance visual
        if (blockActive) {
            ctx.strokeStyle = '#88aaff';
            ctx.lineWidth = 2;
            ctx.strokeRect(px - 5, py - 5, 58, 58);
        }
        
        // Attack effect
        if (player.isAttacking) {
            ctx.fillStyle = player.attackType === 'punch' ? '#ffaa44' : '#ff6644';
            const offset = player.facingRight ? 42 : -25;
            ctx.fillRect(px + 30 + (player.facingRight ? 5 : -20), py + 28, 25, 15);
        }
        
        ctx.globalAlpha = 1;
    }
    
    function drawVillain() {
        const vx = villain.x;
        const vy = villain.y;
        
        // Health bar above villain
        const healthPercent = currentVillain.health / currentVillain.maxHealth;
        ctx.fillStyle = '#330000';
        ctx.fillRect(vx + 5, vy - 18, 70, 10);
        ctx.fillStyle = '#cc0000';
        ctx.fillRect(vx + 5, vy - 18, 70 * healthPercent, 10);
        
        // Villain name
        ctx.font = "bold 10px monospace";
        ctx.fillStyle = '#ffd700';
        ctx.fillText(currentVillain.name, vx + 15, vy - 22);
        
        // Body
        ctx.fillStyle = currentVillain.color;
        ctx.fillRect(vx + 8, vy + 20, 38, 28);
        
        // Head
        ctx.fillRect(vx + 12, vy + 6, 30, 18);
        
        // Eyes
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(vx + 18, vy + 12, 7, 6);
        ctx.fillRect(vx + 29, vy + 12, 7, 6);
        
        // Pupils (crazy!)
        ctx.fillStyle = '#000000';
        ctx.fillRect(vx + 20 + (Math.sin(frame * 0.1) * 1), vy + 13, 3, 4);
        ctx.fillRect(vx + 31 + (Math.sin(frame * 0.1) * 1), vy + 13, 3, 4);
        
        // Mouth
        ctx.fillStyle = '#440000';
        ctx.fillRect(vx + 21, vy + 21, 14, 5);
        
        // Emoji
        ctx.font = "28px monospace";
        ctx.fillStyle = '#ffffff';
        ctx.fillText(currentVillain.emoji, vx + 15, vy - 5);
        
        // Attack flash
        if (villain.isAttacking) {
            ctx.fillStyle = 'rgba(255,50,50,0.4)';
            ctx.fillRect(vx - 10, vy - 10, 80, 80);
        }
    }
    
    function drawSidekick() {
        if (currentSidekick === 0) return;
        
        // Sidekick portrait
        ctx.font = "32px monospace";
        ctx.fillStyle = SIDEKICKS[currentSidekick].color;
        ctx.fillText(SIDEKICKS[currentSidekick].emoji, 20, canvas.height - 35);
        ctx.font = "9px monospace";
        ctx.fillStyle = '#ffd700';
        ctx.fillText(SIDEKICKS[currentSidekick].name, 55, canvas.height - 30);
        
        // Cooldown bar
        if (sidekickCooldown > 0) {
            ctx.fillStyle = '#333366';
            ctx.fillRect(20, canvas.height - 50, 100, 6);
            ctx.fillStyle = SIDEKICKS[currentSidekick].color;
            const cdPercent = 1 - (sidekickCooldown / 90);
            ctx.fillRect(20, canvas.height - 50, 100 * cdPercent, 6);
            ctx.fillStyle = '#aaa';
            ctx.font = "8px monospace";
            ctx.fillText(`${Math.ceil(sidekickCooldown/30)}s`, 125, canvas.height - 45);
        } else {
            ctx.fillStyle = '#44ff44';
            ctx.fillRect(20, canvas.height - 50, 100, 6);
            ctx.fillStyle = '#aaa';
            ctx.font = "8px monospace";
            ctx.fillText('READY!', 125, canvas.height - 45);
        }
    }
    
    function drawHealthBars() {
        // Player health bar
        ctx.fillStyle = '#330000';
        ctx.fillRect(20, 25, 220, 20);
        ctx.fillStyle = '#00cc44';
        ctx.fillRect(20, 25, 220 * (player.health / player.maxHealth), 20);
        ctx.fillStyle = 'white';
        ctx.font = "bold 11px monospace";
        ctx.fillText("BATMAN", 25, 41);
        
        // Player health number
        ctx.fillStyle = '#ffffff';
        ctx.font = "bold 14px monospace";
        ctx.fillText(`${player.health}/${player.maxHealth}`, 180, 42);
        
        // Damage flash overlay
        if (damageFlash > 0) {
            ctx.fillStyle = 'rgba(255,0,0,0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
    
    function drawFloatingTexts() {
        for (let ft of floatingTexts) {
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = ft.color;
            ctx.shadowBlur = 3;
            ctx.fillText(ft.text, ft.x + (shakeAmount * 0.5), ft.y);
        }
        ctx.shadowBlur = 0;
    }
    
    function draw() {
        if (shakeAmount > 0) {
            ctx.save();
            ctx.translate(Math.random() * shakeAmount, Math.random() * shakeAmount);
        }
        
        drawBackground();
        drawHealthBars();
        drawVillain();
        drawBatman();
        drawSidekick();
        drawFloatingTexts();
        
        if (shakeAmount > 0) {
            ctx.restore();
        }
        
        if (!gameRunning) {
            ctx.fillStyle = 'rgba(0,0,0,0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 32px monospace";
            ctx.fillStyle = '#ffd700';
            const isWin = player.health > 0;
            ctx.fillText(isWin ? '🏆 VICTORY! 🏆' : '💀 GAME OVER 💀', canvas.width/2 - 140, canvas.height/2 - 40);
            ctx.font = "18px monospace";
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`Final Score: ${score}`, canvas.width/2 - 70, canvas.height/2 + 20);
            ctx.font = "12px monospace";
            ctx.fillText("Click RESTART to defend Gotham again", canvas.width/2 - 150, canvas.height/2 + 80);
        }
    }
    
    // ========== GAME LOOP ==========
    function gameLoop() {
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // ========== RESTART ==========
    function restartGame() {
        gameRunning = true;
        score = 0;
        currentLevel = 1;
        player.health = 100;
        player.x = 150;
        currentSidekick = 0;
        floatingTexts = [];
        attackCooldown = 0;
        sidekickCooldown = 0;
        invincibleFrames = 0;
        blockActive = false;
        blockTimer = 0;
        timeLeft = 180;
        
        if (timerInterval) clearInterval(timerInterval);
        startTimer();
        
        currentVillain = JSON.parse(JSON.stringify(VILLAINS[1]));
        villain.x = canvas.width - 200;
        updateUI();
        showFloatingText('GAME RESTARTED! FIGHT!', canvas.width/2, 150, '#ffd700');
        document.getElementById('timer').style.color = '#ffd700';
    }
    
    // ========== KEYBOARD CONTROLS ==========
    window.keys = {};
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'arrowleft') keys.ArrowLeft = true;
        if (key === 'arrowright') keys.ArrowRight = true;
        if (key === 'a') { e.preventDefault(); punch(); }
        if (key === 's') { e.preventDefault(); kick(); }
        if (key === 'd') { e.preventDefault(); callSidekick(); }
        if (key === ' ') { e.preventDefault(); block(); }
        if (key === 'r') { e.preventDefault(); restartGame(); }
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'arrowleft') keys.ArrowLeft = false;
        if (key === 'arrowright') keys.ArrowRight = false;
    });
    
    // Mobile touch controls
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        if (touchX < canvas.width / 4) punch();
        else if (touchX < canvas.width / 2) kick();
        else if (touchX < canvas.width * 3/4) block();
        else callSidekick();
    });
    
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        player.x = Math.min(Math.max(touchX - 30, 60), canvas.width - 250);
    });
    
    startTimer();
    updateUI();
    gameLoop();
</script>
</body>
</html>
