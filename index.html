<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BATMAN: Arcade Fighter 🦇 | Easy Combat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        canvas {
            border: 4px solid #ffd700;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            background: #0a0a2a;
            cursor: pointer;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-panel {
            background: rgba(0,0,0,0.85);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            font-family: monospace;
            color: #ffd700;
            font-weight: bold;
            font-size: 14px;
        }

        .stat-panel span {
            color: white;
            font-size: 1.3rem;
            margin-left: 8px;
        }

        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
        }

        .controls kbd {
            background: #222;
            padding: 3px 8px;
            border-radius: 5px;
            color: #ffd700;
            margin: 0 3px;
            font-weight: bold;
        }

        .restart-btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            background: #ffed4a;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="stat-panel">🏆 SCORE <span id="score">0</span></div>
        <div class="stat-panel">📍 LEVEL <span id="level">1</span></div>
        <div class="stat-panel">🤝 SIDEKICK <span id="sidekick">⚫ None</span></div>
        <div class="stat-panel">❤️ HP <span id="health">100</span>/100</div>
    </div>
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
    <div class="controls">
        🎮 <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;| <kbd>A</kbd> Punch (10 dmg) &nbsp;| <kbd>S</kbd> Kick (15 dmg) &nbsp;|
        <kbd>D</kbd> Call Sidekick (lvl 2+) &nbsp;| <kbd>R</kbd> Restart
    </div>
    <button class="restart-btn" onclick="restartGame()">🔄 RESTART GAME</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ========== GAME STATE ==========
    let score = 0;
    let currentLevel = 1;
    let gameRunning = true;
    let frame = 0;
    let attackCooldown = 0;
    let sidekickCooldown = 0;
    let damageFlash = 0;
    let invincibleFrames = 0;
    
    // ========== SIDEKICKS ==========
    const SIDEKICKS = {
        0: { name: 'None', emoji: '⚫', color: '#666', damage: 0 },
        1: { name: 'Robin', emoji: '🤸', color: '#44ff44', damage: 25 },
        2: { name: 'Batgirl', emoji: '🦸‍♀️', color: '#ff69b4', damage: 40 },
        3: { name: 'Nightwing', emoji: '⚡', color: '#44aaff', damage: 55 }
    };
    let currentSidekick = 0;
    
    // ========== VILLAINS ==========
    const VILLAINS = {
        1: { name: 'Scarecrow', health: 80, maxHealth: 80, damage: 8, color: '#8B4513', emoji: '🌾' },
        2: { name: 'Hush', health: 90, maxHealth: 90, damage: 9, color: '#2F4F4F', emoji: '🩺' },
        3: { name: 'Riddler', health: 85, maxHealth: 85, damage: 8, color: '#006400', emoji: '❓' },
        4: { name: 'Clayface', health: 110, maxHealth: 110, damage: 10, color: '#8B6914', emoji: '🧱' },
        5: { name: 'Mr Freeze', health: 95, maxHealth: 95, damage: 9, color: '#00BFFF', emoji: '❄️' },
        6: { name: 'Joker', health: 100, maxHealth: 100, damage: 10, color: '#9400D3', emoji: '🃏' }
    };
    
    let currentVillain = JSON.parse(JSON.stringify(VILLAINS[1]));
    
    // ========== PLAYER ==========
    const player = {
        x: 150,
        y: canvas.height - 100,
        width: 48,
        height: 48,
        health: 100,
        maxHealth: 100,
        isAttacking: false,
        attackTimer: 0,
        facingRight: true
    };
    
    // ========== VILLAIN ==========
    const villain = {
        x: canvas.width - 180,
        y: canvas.height - 100,
        width: 52,
        height: 52,
        moveDirection: -1,
        moveTimer: 0
    };
    
    // ========== UI UPDATES ==========
    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = currentLevel;
        document.getElementById('health').innerText = player.health;
        document.getElementById('sidekick').innerHTML = SIDEKICKS[currentSidekick].emoji + ' ' + SIDEKICKS[currentSidekick].name;
    }
    
    // ========== CHECK SIDEKICK UNLOCK ==========
    function checkSidekickUnlock() {
        if (currentLevel >= 2 && currentSidekick === 0) {
            currentSidekick = 1;
            showFloatingText(`✨ ${SIDEKICKS[1].name} JOINED! ✨`, canvas.width/2, 100, '#44ff44');
        }
        if (currentLevel >= 4 && currentSidekick === 1) {
            currentSidekick = 2;
            showFloatingText(`✨ ${SIDEKICKS[2].name} JOINED! ✨`, canvas.width/2, 100, '#ff69b4');
        }
        if (currentLevel >= 6 && currentSidekick === 2) {
            currentSidekick = 3;
            showFloatingText(`✨ ${SIDEKICKS[3].name} JOINED! ✨`, canvas.width/2, 100, '#44aaff');
        }
        updateUI();
    }
    
    // ========== ATTACKS - SIMPLE DAMAGE ==========
    function punch() {
        if (!gameRunning) return;
        if (attackCooldown > 0) return;
        
        player.isAttacking = true;
        player.attackTimer = 10;
        attackCooldown = 15;
        
        // Check if close enough to hit
        const distance = Math.abs(player.x - villain.x);
        if (distance < 80) {
            const damage = 10;
            currentVillain.health -= damage;
            score += 10;
            updateUI();
            showFloatingText(`PUNCH! -${damage}`, villain.x + 20, villain.y - 20, '#ffaa44');
            
            if (currentVillain.health <= 0) {
                defeatVillain();
            }
        } else {
            showFloatingText('MISS!', player.x + 20, player.y - 30, '#ff6666');
        }
    }
    
    function kick() {
        if (!gameRunning) return;
        if (attackCooldown > 0) return;
        
        player.isAttacking = true;
        player.attackTimer = 12;
        attackCooldown = 20;
        
        const distance = Math.abs(player.x - villain.x);
        if (distance < 80) {
            const damage = 15;
            currentVillain.health -= damage;
            score += 15;
            updateUI();
            showFloatingText(`KICK! -${damage}`, villain.x + 20, villain.y - 20, '#ff8844');
            
            if (currentVillain.health <= 0) {
                defeatVillain();
            }
        } else {
            showFloatingText('MISS!', player.x + 20, player.y - 30, '#ff6666');
        }
    }
    
    function callSidekick() {
        if (!gameRunning) return;
        if (currentSidekick === 0) {
            showFloatingText('Unlock at Level 2!', canvas.width/2, 150, '#ffaa00');
            return;
        }
        if (sidekickCooldown > 0) return;
        
        sidekickCooldown = 60;
        const damage = SIDEKICKS[currentSidekick].damage;
        currentVillain.health -= damage;
        score += 20;
        updateUI();
        showFloatingText(`${SIDEKICKS[currentSidekick].name} ASSIST! -${damage}!`, villain.x + 20, villain.y - 40, SIDEKICKS[currentSidekick].color);
        
        if (currentVillain.health <= 0) {
            defeatVillain();
        }
    }
    
    // ========== DEFEAT VILLAIN / NEXT LEVEL ==========
    function defeatVillain() {
        const levelBonus = currentLevel * 100;
        score += levelBonus;
        updateUI();
        showFloatingText(`⭐ VICTORY! +${levelBonus} ⭐`, canvas.width/2, 150, '#ffd700');
        
        if (currentLevel < 6) {
            currentLevel++;
            checkSidekickUnlock();
            
            // Reset villain for next level
            currentVillain = JSON.parse(JSON.stringify(VILLAINS[currentLevel]));
            villain.x = canvas.width - 180;
            // Heal player a bit between levels
            player.health = Math.min(player.health + 20, player.maxHealth);
            updateUI();
            showFloatingText(`⚔️ LEVEL ${currentLevel}: ${currentVillain.name}! ⚔️`, canvas.width/2, 80, '#ffaa00');
        } else {
            gameRunning = false;
            showFloatingText('🏆 YOU BEAT THE GAME! 🏆', canvas.width/2, 200, '#ffd700');
        }
    }
    
    // ========== VILLAIN ATTACKS PLAYER ==========
    let villainAttackTimer = 0;
    function villainAttack() {
        if (!gameRunning) return;
        
        const distance = Math.abs(player.x - villain.x);
        if (distance < 80 && villainAttackTimer <= 0) {
            if (invincibleFrames <= 0) {
                const damage = currentVillain.damage;
                player.health -= damage;
                damageFlash = 10;
                invincibleFrames = 30;
                updateUI();
                showFloatingText(`-${damage}!`, player.x + 20, player.y - 20, '#ff4444');
                
                // INSTANT RESPAWN - just reduce health, no game over until 0
                if (player.health <= 0) {
                    player.health = 0;
                    gameRunning = false;
                    showFloatingText('💀 GAME OVER 💀', canvas.width/2, 200, '#ff0000');
                }
            }
            villainAttackTimer = 40;
        } else {
            if (villainAttackTimer > 0) villainAttackTimer--;
        }
    }
    
    // ========== VILLAIN MOVEMENT ==========
    function updateVillainMovement() {
        if (!gameRunning) return;
        villain.moveTimer++;
        if (villain.moveTimer > 50) {
            villain.moveDirection *= -1;
            villain.moveTimer = 0;
        }
        let newX = villain.x + (villain.moveDirection * 1.2);
        if (newX > canvas.width - 100) newX = canvas.width - 100;
        if (newX < canvas.width - 350) newX = canvas.width - 350;
        villain.x = newX;
    }
    
    // ========== UPDATE GAME ==========
    let floatingTexts = [];
    
    function showFloatingText(text, x, y, color) {
        floatingTexts.push({ text, x, y, color, life: 40 });
    }
    
    function updateGame() {
        if (!gameRunning) return;
        
        frame++;
        if (attackCooldown > 0) attackCooldown--;
        if (sidekickCooldown > 0) sidekickCooldown--;
        if (damageFlash > 0) damageFlash--;
        if (invincibleFrames > 0) invincibleFrames--;
        if (player.attackTimer > 0) player.attackTimer--;
        else player.isAttacking = false;
        
        // Update floating texts
        for (let i = 0; i < floatingTexts.length; i++) {
            floatingTexts[i].life--;
            floatingTexts[i].y -= 1;
            if (floatingTexts[i].life <= 0) {
                floatingTexts.splice(i, 1);
                i--;
            }
        }
        
        // Player movement
        const keys = window.keys || {};
        if (keys.ArrowLeft && player.x > 50) {
            player.x -= 5;
            player.facingRight = false;
        }
        if (keys.ArrowRight && player.x < canvas.width - 200) {
            player.x += 5;
            player.facingRight = true;
        }
        
        updateVillainMovement();
        villainAttack();
    }
    
    // ========== DRAW EVERYTHING ==========
    function drawBackground() {
        // Sky
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#0a0a2a');
        grad.addColorStop(1, '#1a1a3a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Buildings
        ctx.fillStyle = '#152238';
        for (let i = 0; i < 12; i++) {
            ctx.fillRect(40 + i * 85, canvas.height - 80 - (50 + Math.sin(i) * 30), 35, 50 + Math.sin(i) * 30);
        }
        
        // Bat signal
        ctx.fillStyle = '#ffd700';
        ctx.font = "30px monospace";
        ctx.fillText("🦇", canvas.width - 60, 65);
        
        // Ground
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(0, canvas.height - 55, canvas.width, 55);
        ctx.fillStyle = '#3a3a4a';
        for (let i = 0; i < 20; i++) {
            ctx.fillRect(i * 50, canvas.height - 55, 25, 4);
        }
    }
    
    function drawBatman() {
        const px = player.x;
        const py = player.y;
        
        // Invincible flash
        if (invincibleFrames > 0 && (Math.floor(Date.now() / 50) % 2 === 0)) {
            ctx.globalAlpha = 0.5;
        }
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(px + 8, py + 45, 32, 8);
        
        // Cape
        ctx.fillStyle = '#1a1a3a';
        ctx.fillRect(px - (player.facingRight ? 8 : 5), py + 20, 12, 28);
        
        // Body
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(px + 10, py + 25, 28, 22);
        
        // Bat symbol
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(px + 20, py + 32, 8, 6);
        
        // Belt
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(px + 10, py + 42, 28, 4);
        
        // Head
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(px + 14, py + 10, 20, 18);
        
        // Ears
        ctx.fillRect(px + 16, py + 2, 4, 12);
        ctx.fillRect(px + 28, py + 2, 4, 12);
        
        // Eyes
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px + 18, py + 15, 5, 4);
        ctx.fillRect(px + 25, py + 15, 5, 4);
        
        // Pupils
        ctx.fillStyle = '#000000';
        ctx.fillRect(px + (player.facingRight ? 21 : 19), py + 16, 2, 3);
        ctx.fillRect(px + (player.facingRight ? 28 : 26), py + 16, 2, 3);
        
        // Attack effect
        if (player.isAttacking) {
            ctx.fillStyle = '#ffaa44';
            ctx.fillRect(px + 35 + (player.facingRight ? 5 : -25), py + 28, 20, 12);
        }
        
        ctx.globalAlpha = 1;
    }
    
    function drawVillain() {
        const vx = villain.x;
        const vy = villain.y;
        
        // Health bar above villain
        const healthPercent = currentVillain.health / currentVillain.maxHealth;
        ctx.fillStyle = '#330000';
        ctx.fillRect(vx + 5, vy - 15, 60, 8);
        ctx.fillStyle = '#cc0000';
        ctx.fillRect(vx + 5, vy - 15, 60 * healthPercent, 8);
        
        // Body
        ctx.fillStyle = currentVillain.color;
        ctx.fillRect(vx + 8, vy + 20, 36, 28);
        
        // Head
        ctx.fillRect(vx + 12, vy + 6, 28, 18);
        
        // Eyes
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(vx + 18, vy + 12, 6, 5);
        ctx.fillRect(vx + 28, vy + 12, 6, 5);
        
        // Pupils
        ctx.fillStyle = '#000000';
        ctx.fillRect(vx + 20, vy + 13, 2, 3);
        ctx.fillRect(vx + 30, vy + 13, 2, 3);
        
        // Mouth
        ctx.fillStyle = '#440000';
        ctx.fillRect(vx + 20, vy + 20, 12, 4);
        
        // Emoji
        ctx.font = "24px monospace";
        ctx.fillStyle = '#ffffff';
        ctx.fillText(currentVillain.emoji, vx + 14, vy - 8);
        
        // Name
        ctx.font = "bold 10px monospace";
        ctx.fillStyle = '#ffd700';
        ctx.fillText(currentVillain.name, vx + 12, vy - 25);
    }
    
    function drawSidekick() {
        if (currentSidekick === 0) return;
        if (sidekickCooldown > 50) {
            // Sidekick appears when attacking!
            ctx.font = "32px monospace";
            ctx.fillStyle = SIDEKICKS[currentSidekick].color;
            ctx.fillText(SIDEKICKS[currentSidekick].emoji, villain.x + 15, villain.y - 20);
            ctx.font = "10px monospace";
            ctx.fillStyle = '#ffd700';
            ctx.fillText(SIDEKICKS[currentSidekick].name, villain.x + 15, villain.y - 35);
        }
        
        // Sidekick portrait
        ctx.font = "28px monospace";
        ctx.fillStyle = SIDEKICKS[currentSidekick].color;
        ctx.fillText(SIDEKICKS[currentSidekick].emoji, 20, canvas.height - 30);
        ctx.font = "8px monospace";
        ctx.fillStyle = '#ffd700';
        ctx.fillText(SIDEKICKS[currentSidekick].name, 45, canvas.height - 25);
        
        // Cooldown bar
        if (sidekickCooldown > 0) {
            ctx.fillStyle = '#333366';
            ctx.fillRect(20, canvas.height - 45, 100, 6);
            ctx.fillStyle = SIDEKICKS[currentSidekick].color;
            const cdPercent = 1 - (sidekickCooldown / 60);
            ctx.fillRect(20, canvas.height - 45, 100 * cdPercent, 6);
        }
    }
    
    function drawHealthBar() {
        // Player health bar
        ctx.fillStyle = '#330000';
        ctx.fillRect(20, 20, 200, 18);
        ctx.fillStyle = '#00cc00';
        ctx.fillRect(20, 20, 200 * (player.health / player.maxHealth), 18);
        ctx.fillStyle = 'white';
        ctx.font = "bold 10px monospace";
        ctx.fillText("BATMAN HP", 25, 35);
    }
    
    function drawFloatingTexts() {
        for (let ft of floatingTexts) {
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = ft.color;
            ctx.shadowBlur = 3;
            ctx.fillText(ft.text, ft.x, ft.y);
        }
        ctx.shadowBlur = 0;
    }
    
    function drawDamageFlash() {
        if (damageFlash > 0) {
            ctx.fillStyle = 'rgba(255,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
    
    function draw() {
        drawBackground();
        drawHealthBar();
        drawVillain();
        drawBatman();
        drawSidekick();
        drawFloatingTexts();
        drawDamageFlash();
        
        if (!gameRunning) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 28px monospace";
            ctx.fillStyle = '#ffd700';
            ctx.fillText(player.health <= 0 ? '💀 GAME OVER 💀' : '🏆 VICTORY! 🏆', canvas.width/2 - 130, canvas.height/2 - 30);
            ctx.font = "14px monospace";
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`Final Score: ${score}`, canvas.width/2 - 50, canvas.height/2 + 20);
            ctx.fillText("Click RESTART to play again", canvas.width/2 - 120, canvas.height/2 + 70);
        }
    }
    
    // ========== GAME LOOP ==========
    function gameLoop() {
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // ========== RESTART ==========
    function restartGame() {
        gameRunning = true;
        score = 0;
        currentLevel = 1;
        player.health = 100;
        player.x = 150;
        currentSidekick = 0;
        floatingTexts = [];
        attackCooldown = 0;
        sidekickCooldown = 0;
        invincibleFrames = 0;
        
        currentVillain = JSON.parse(JSON.stringify(VILLAINS[1]));
        villain.x = canvas.width - 180;
        updateUI();
        showFloatingText('GAME RESTARTED!', canvas.width/2, 150, '#ffd700');
    }
    
    // ========== KEYBOARD CONTROLS ==========
    window.keys = {};
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'arrowleft') keys.ArrowLeft = true;
        if (key === 'arrowright') keys.ArrowRight = true;
        if (key === 'a') { e.preventDefault(); punch(); }
        if (key === 's') { e.preventDefault(); kick(); }
        if (key === 'd') { e.preventDefault(); callSidekick(); }
        if (key === 'r') { e.preventDefault(); restartGame(); }
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'arrowleft') keys.ArrowLeft = false;
        if (key === 'arrowright') keys.ArrowRight = false;
    });
    
    // Mobile touch controls
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        if (touchX < canvas.width / 3) punch();
        else if (touchX < canvas.width * 2/3) kick();
        else callSidekick();
    });
    
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        player.x = Math.min(Math.max(touchX - 25, 50), canvas.width - 200);
    });
    
    updateUI();
    gameLoop();
</script>
</body>
</html>
