<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BATMAN: Gotham Knights 🦇 | Pixel Brawler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        canvas {
            border: 4px solid #ffd700;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            background: #0a0a2a;
            cursor: pointer;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-panel {
            background: rgba(0,0,0,0.85);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            font-family: monospace;
            color: #ffd700;
            font-weight: bold;
            font-size: 12px;
        }

        .stat-panel span {
            color: white;
            font-size: 1.2rem;
            margin-left: 8px;
        }

        .timer-panel {
            background: rgba(0,0,0,0.85);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            font-family: monospace;
            color: #ffd700;
        }

        .timer-panel span {
            color: #ff4444;
            font-size: 1.3rem;
            margin-left: 8px;
            font-weight: bold;
        }

        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 8px;
        }

        .controls kbd {
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
            color: #ffd700;
            margin: 0 2px;
            font-weight: bold;
        }

        .restart-btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 12px;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            background: #ffed4a;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="stat-panel">🏆 SCORE <span id="score">0</span></div>
        <div class="stat-panel">📍 <span id="levelName">Arkham Asylum</span></div>
        <div class="timer-panel">⏱️ <span id="timer">180</span>s</div>
        <div class="stat-panel">🤝 <span id="sidekick">⚫ Robin</span></div>
        <div class="stat-panel">❤️ <span id="health">100</span>/100</div>
    </div>
    <canvas id="gameCanvas" width="1100" height="550"></canvas>
    <div class="controls">
        🎮 <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;| <kbd>A</kbd> Punch (10) &nbsp;| <kbd>S</kbd> Kick (15) &nbsp;|
        <kbd>D</kbd> Call Sidekick &nbsp;| <kbd>SPACE</kbd> Block
    </div>
    <button class="restart-btn" onclick="restartGame()">🔄 RESTART</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // ========== GAME STATE ==========
    let score = 0;
    let currentLevel = 1;
    let gameRunning = true;
    let frame = 0;
    let attackCooldown = 0;
    let sidekickCooldown = 0;
    let damageFlash = 0;
    let invincibleFrames = 0;
    let blockActive = false;
    let blockTimer = 0;
    let timeLeft = 180;
    let timerInterval = null;
    let shakeAmount = 0;

    // ========== SIDEKICKS ==========
    // Robin & Batgirl = static assist, Nightwing = MOVES & FIGHTS!
    let nightwingActive = false;
    let nightwing = {
        x: 0,
        y: 0,
        active: false,
        attackTimer: 0,
        moveTimer: 0
    };

    const SIDEKICKS = {
        1: { name: 'Robin', emoji: '🤸', color: '#44ff44', damage: 20, moves: false },
        2: { name: 'Batgirl', emoji: '🦸‍♀️', color: '#ff69b4', damage: 30, moves: false },
        3: { name: 'Nightwing', emoji: '⚡', color: '#44aaff', damage: 25, moves: true }
    };
    let currentSidekickLevel = 0; // 0=none, 1=Robin, 2=Batgirl, 3=Nightwing

    // ========== LEVELS WITH UNIQUE LOCATIONS ==========
    const LEVELS = {
        1: { 
            name: 'ARKHAM ASYLUM', villain: 'Scarecrow', health: 180, damage: 6, 
            color: '#8B4513', eyeColor: '#ff6600', emoji: '🌾',
            bgColor1: '#1a0a2a', bgColor2: '#2a1a3a', groundColor: '#3a2a3a',
            details: ['CELL BLOCK', 'CRACKED WALLS', 'FOG']
        },
        2: { 
            name: 'GOTHAM CEMETERY', villain: 'Hush', health: 200, damage: 7,
            color: '#2F4F4F', eyeColor: '#ff0000', emoji: '🩺',
            bgColor1: '#0a1a1a', bgColor2: '#1a2a2a', groundColor: '#2a3a2a',
            details: ['GRAVESTONES', 'FULL MOON', 'MIST']
        },
        3: { 
            name: 'GOTHAM BANK', villain: 'Riddler', health: 190, damage: 6,
            color: '#006400', eyeColor: '#00ff00', emoji: '❓',
            bgColor1: '#1a1a00', bgColor2: '#2a2a10', groundColor: '#3a3a20',
            details: ['GOLD VAULT', 'GREEN LIGHTS', 'SECURITY CAMS']
        },
        4: { 
            name: 'GOTHAM SEWERS', villain: 'Clayface', health: 250, damage: 8,
            color: '#8B6914', eyeColor: '#ffaa00', emoji: '🧱',
            bgColor1: '#0a1a0a', bgColor2: '#1a2a1a', groundColor: '#2a3a2a',
            details: ['PIPES', 'DARK WATER', 'DRIPPING']
        },
        5: { 
            name: 'ICEBERG LOUNGE', villain: 'Mr Freeze', health: 220, damage: 7,
            color: '#00BFFF', eyeColor: '#88ddff', emoji: '❄️',
            bgColor1: '#001a2a', bgColor2: '#102a3a', groundColor: '#203a4a',
            details: ['NEON SIGNS', 'ICE FLOOR', 'DJ BOOTH']
        },
        6: { 
            name: 'JOKER FUNHOUSE', villain: 'Joker', health: 280, damage: 9,
            color: '#9400D3', eyeColor: '#ff00ff', emoji: '🃏',
            bgColor1: '#2a001a', bgColor2: '#3a102a', groundColor: '#4a203a',
            details: ['CARNIVAL', 'BALLOONS', 'FUN MIRRORS']
        }
    };

    let currentLevelData = LEVELS[1];
    let currentVillainHealth = currentLevelData.health;
    let currentVillainMaxHealth = currentLevelData.health;

    // ========== PLAYER ==========
    const player = {
        x: 150, y: canvas.height - 120, width: 40, height: 48,
        health: 100, maxHealth: 100,
        isAttacking: false, attackTimer: 0, facingRight: true, attackType: ''
    };

    // ========== VILLAIN ==========
    const villain = {
        x: canvas.width - 200, y: canvas.height - 120, width: 44, height: 48,
        isAttacking: false, attackTimer: 0, attackCooldown: 0,
        moveDirection: -1, moveTimer: 0
    };

    // ========== UI ==========
    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('levelName').innerHTML = currentLevelData.name;
        document.getElementById('health').innerText = player.health;
        let sidekickName = 'None';
        if (currentSidekickLevel === 1) sidekickName = '🤸 Robin';
        else if (currentSidekickLevel === 2) sidekickName = '🦸‍♀️ Batgirl';
        else if (currentSidekickLevel === 3) sidekickName = '⚡ Nightwing';
        document.getElementById('sidekick').innerHTML = sidekickName;
    }

    // ========== TIMER ==========
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameRunning) return;
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 30) document.getElementById('timer').style.color = '#ff0000';
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameRunning = false;
                    showFloatingText('🎉 TIME\'S UP! VICTORY! 🎉', canvas.width/2, 200, '#ffd700');
                    score += currentLevel * 500;
                    updateUI();
                }
            }
        }, 1000);
    }

    // ========== SIDEKICK UNLOCK ==========
    function checkSidekickUnlock() {
        if (currentLevel >= 2 && currentSidekickLevel === 0) currentSidekickLevel = 1;
        if (currentLevel >= 4 && currentSidekickLevel === 1) currentSidekickLevel = 2;
        if (currentLevel >= 6 && currentSidekickLevel === 2) {
            currentSidekickLevel = 3;
            showFloatingText('⚡ NIGHTWING JOINS THE FIGHT! ⚡', canvas.width/2, 100, '#44aaff');
        }
        updateUI();
    }

    // ========== NIGHTWING AI (MOVES AND FIGHTS!) ==========
    function updateNightwing() {
        if (currentSidekickLevel !== 3) return;
        
        if (!nightwingActive) {
            nightwing.active = true;
            nightwing.x = player.x - 60;
            nightwing.y = player.y;
        }
        
        // Nightwing moves toward the villain!
        if (nightwing.active) {
            // Move toward villain
            if (nightwing.x < villain.x - 80) nightwing.x += 2.5;
            if (nightwing.x > villain.x - 80) nightwing.x -= 1;
            
            // Keep near Batman but not too far
            if (nightwing.x < player.x - 100) nightwing.x = player.x - 90;
            if (nightwing.x > player.x + 50) nightwing.x = player.x + 40;
            
            nightwing.y = player.y;
            
            // Nightwing attacks every 60 frames!
            nightwing.moveTimer++;
            if (nightwing.moveTimer > 60 && Math.abs(nightwing.x - villain.x) < 100) {
                nightwing.moveTimer = 0;
                nightwing.attackTimer = 15;
                const damage = 18;
                currentVillainHealth -= damage;
                score += 15;
                updateUI();
                showFloatingText(`⚡ NIGHTWING! -${damage}`, villain.x + 20, villain.y - 40, '#44aaff');
                playSound('hit');
                if (currentVillainHealth <= 0) defeatVillain();
            }
            if (nightwing.attackTimer > 0) nightwing.attackTimer--;
        }
    }

    // ========== CALL SIDEKICK ==========
    function callSidekick() {
        if (!gameRunning) return;
        if (currentSidekickLevel === 0) {
            showFloatingText('Unlock at Level 2!', canvas.width/2, 150, '#ffaa00');
            return;
        }
        if (sidekickCooldown > 0) return;
        
        sidekickCooldown = 60;
        let damage = 0;
        let name = '';
        
        if (currentSidekickLevel === 1) { damage = 20; name = 'ROBIN'; }
        else if (currentSidekickLevel === 2) { damage = 30; name = 'BATGIRL'; }
        else if (currentSidekickLevel === 3) { damage = 25; name = 'NIGHTWING'; }
        
        currentVillainHealth -= damage;
        score += 20;
        updateUI();
        showFloatingText(`${name} ASSIST! -${damage}!`, villain.x + 20, villain.y - 50, '#ffd700');
        playSound('hit');
        
        if (currentVillainHealth <= 0) defeatVillain();
    }

    // ========== ATTACKS ==========
    function punch() {
        if (!gameRunning || attackCooldown > 0 || player.isAttacking) return;
        player.isAttacking = true;
        player.attackType = 'punch';
        player.attackTimer = 10;
        attackCooldown = 20;
        
        if (Math.abs(player.x - villain.x) < 90) {
            const damage = 10;
            currentVillainHealth -= damage;
            score += 10;
            updateUI();
            showFloatingText(`PUNCH! -${damage}`, villain.x + 20, villain.y - 20, '#ffaa44');
            playSound('hit');
            if (currentVillainHealth <= 0) defeatVillain();
        } else {
            showFloatingText('MISS!', player.x + 20, player.y - 30, '#ff6666');
        }
    }

    function kick() {
        if (!gameRunning || attackCooldown > 0 || player.isAttacking) return;
        player.isAttacking = true;
        player.attackType = 'kick';
        player.attackTimer = 12;
        attackCooldown = 25;
        
        if (Math.abs(player.x - villain.x) < 90) {
            const damage = 15;
            currentVillainHealth -= damage;
            score += 15;
            updateUI();
            showFloatingText(`KICK! -${damage}`, villain.x + 20, villain.y - 20, '#ff8844');
            playSound('hit');
            if (currentVillainHealth <= 0) defeatVillain();
        } else {
            showFloatingText('MISS!', player.x + 20, player.y - 30, '#ff6666');
        }
    }

    function block() {
        if (!gameRunning || blockTimer > 0) return;
        blockActive = true;
        blockTimer = 20;
        showFloatingText('🛡️ BLOCK!', player.x, player.y - 30, '#88aaff');
    }

    // ========== VILLAIN AI ==========
    function villainAttack() {
        if (!gameRunning) return;
        if (villain.attackCooldown > 0) { villain.attackCooldown--; return; }
        
        if (Math.abs(player.x - villain.x) < 100 && !villain.isAttacking) {
            villain.isAttacking = true;
            villain.attackTimer = 15;
            villain.attackCooldown = 45;
            
            setTimeout(() => {
                if (!gameRunning) return;
                if (Math.abs(player.x - villain.x) < 100) {
                    if (blockActive) {
                        showFloatingText('BLOCKED!', player.x + 20, player.y - 30, '#88ff88');
                        blockActive = false;
                    } else if (invincibleFrames <= 0) {
                        player.health -= currentLevelData.damage;
                        damageFlash = 15;
                        invincibleFrames = 25;
                        updateUI();
                        showFloatingText(`-${currentLevelData.damage}!`, player.x + 20, player.y - 20, '#ff4444');
                        if (player.health <= 0) {
                            gameRunning = false;
                            if (timerInterval) clearInterval(timerInterval);
                        }
                    }
                }
                villain.isAttacking = false;
            }, 350);
        }
    }

    // ========== VILLAIN MOVEMENT ==========
    function updateVillainMovement() {
        villain.moveTimer++;
        if (villain.moveTimer > 60) {
            villain.moveDirection *= -1;
            villain.moveTimer = 0;
        }
        let newX = villain.x + (villain.moveDirection * 1.2);
        if (newX > canvas.width - 120) newX = canvas.width - 120;
        if (newX < canvas.width - 350) newX = canvas.width - 350;
        villain.x = newX;
    }

    // ========== DEFEAT VILLAIN ==========
    function defeatVillain() {
        score += currentLevel * 150;
        updateUI();
        showFloatingText(`⭐ ${currentLevelData.villain} DEFEATED! +${currentLevel * 150} ⭐`, canvas.width/2, 150, '#ffd700');
        
        if (currentLevel < 6) {
            currentLevel++;
            currentLevelData = LEVELS[currentLevel];
            currentVillainHealth = currentLevelData.health;
            currentVillainMaxHealth = currentLevelData.health;
            villain.x = canvas.width - 200;
            player.health = Math.min(player.health + 30, 100);
            timeLeft += 30;
            document.getElementById('timer').innerText = timeLeft;
            checkSidekickUnlock();
            updateUI();
            showFloatingText(`📍 ${currentLevelData.name}`, canvas.width/2, 80, '#ffaa00');
        } else {
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            showFloatingText('🏆 GOTHAM IS SAFE! 🏆', canvas.width/2, 200, '#ffd700');
        }
    }

    // ========== VISUAL EFFECTS ==========
    let floatingTexts = [];
    function showFloatingText(text, x, y, color) {
        floatingTexts.push({ text, x, y, color, life: 50 });
    }

    function playSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = type === 'hit' ? 600 : 300;
            gain.gain.value = 0.1;
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
            setTimeout(() => audioCtx.close(), 200);
        } catch(e) {}
    }

    // ========== PIXEL ART DRAWING ==========
    
    // Background based on level
    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, currentLevelData.bgColor1);
        grad.addColorStop(1, currentLevelData.bgColor2);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Level-specific decorations
        ctx.fillStyle = '#ffd70033';
        ctx.font = "bold 14px monospace";
        
        if (currentLevel === 1) { // Arkham Asylum
            for (let i = 0; i < 8; i++) {
                ctx.fillStyle = '#2a1a3a';
                ctx.fillRect(50 + i * 130, canvas.height - 200, 60, 150);
                ctx.fillStyle = '#ffaa33';
                for (let w = 0; w < 2; w++) {
                    ctx.fillRect(65 + i * 130 + w * 30, canvas.height - 190, 15, 25);
                }
            }
            // Fog
            ctx.fillStyle = '#ffffff10';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(0, canvas.height - 100 + i * 20, canvas.width, 15);
            }
        } else if (currentLevel === 2) { // Cemetery
            ctx.fillStyle = '#ffffff20';
            for (let i = 0; i < 12; i++) {
                ctx.fillRect(40 + i * 90, canvas.height - 80 - Math.sin(i) * 20, 15, 40);
                ctx.fillText("RIP", 45 + i * 90, canvas.height - 60 - Math.sin(i) * 20);
            }
            // Moon
            ctx.fillStyle = '#ffffaa';
            ctx.beginPath();
            ctx.arc(100, 80, 35, 0, Math.PI * 2);
            ctx.fill();
        } else if (currentLevel === 3) { // Bank
            for (let i = 0; i < 6; i++) {
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(100 + i * 150, canvas.height - 180, 100, 130);
                ctx.fillStyle = '#000000';
                ctx.fillRect(120 + i * 150, canvas.height - 160, 60, 100);
            }
        } else if (currentLevel === 4) { // Sewers
            for (let i = 0; i < 10; i++) {
                ctx.fillStyle = '#3a5a3a';
                ctx.fillRect(30 + i * 110, canvas.height - 120, 30, 70);
                ctx.fillStyle = '#5a7a5a';
                ctx.beginPath();
                ctx.ellipse(45 + i * 110, canvas.height - 130, 15, 10, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (currentLevel === 5) { // Iceberg Lounge
            ctx.fillStyle = '#00ffff44';
            for (let i = 0; i < 15; i++) {
                ctx.fillRect(20 + i * 70, canvas.height - 100 + Math.sin(i) * 15, 30, 50);
            }
            ctx.fillStyle = '#ff00ffaa';
            ctx.font = "bold 20px monospace";
            ctx.fillText("ICE", canvas.width - 100, 80);
        } else { // Joker Funhouse
            for (let i = 0; i < 8; i++) {
                ctx.fillStyle = i % 2 === 0 ? '#ff00ff' : '#ffff00';
                ctx.fillRect(50 + i * 130, canvas.height - 150, 40, 100);
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.ellipse(70 + i * 130, canvas.height - 170, 20, 20, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Ground
        ctx.fillStyle = currentLevelData.groundColor;
        ctx.fillRect(0, canvas.height - 65, canvas.width, 65);
        ctx.fillStyle = '#ffd700';
        ctx.font = "bold 10px monospace";
        ctx.fillText(currentLevelData.name, canvas.width/2 - 60, canvas.height - 10);
    }

    // Classic Batman (blue/grey, yellow symbol)
    function drawBatman() {
        const px = player.x;
        const py = player.y;
        
        if (invincibleFrames > 0 && (Math.floor(Date.now() / 50) % 2 === 0)) ctx.globalAlpha = 0.5;
        
        // Shadow
        ctx.fillStyle = '#00000033';
        ctx.fillRect(px + 5, py + 45, 35, 5);
        
        // Cape (blue)
        ctx.fillStyle = '#2244aa';
        ctx.fillRect(px - (player.facingRight ? 12 : 5), py + 15, 18, 35);
        
        // Body (grey)
        ctx.fillStyle = '#555555';
        ctx.fillRect(px + 8, py + 22, 30, 26);
        
        // Yellow belt
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(px + 8, py + 44, 30, 4);
        
        // Bat symbol (yellow)
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(px + 23, py + 30);
        ctx.lineTo(px + 20, py + 34);
        ctx.lineTo(px + 23, py + 33);
        ctx.lineTo(px + 26, py + 34);
        ctx.fill();
        
        // Head (blue)
        ctx.fillStyle = '#3366cc';
        ctx.fillRect(px + 12, py + 8, 22, 18);
        
        // Ears
        ctx.fillStyle = '#3366cc';
        ctx.fillRect(px + 14, py + 0, 5, 10);
        ctx.fillRect(px + 27, py + 0, 5, 10);
        
        // Eyes (white)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px + 16, py + 14, 6, 5);
        ctx.fillRect(px + 24, py + 14, 6, 5);
        
        // Pupils
        ctx.fillStyle = '#000000';
        ctx.fillRect(px + (player.facingRight ? 20 : 18), py + 15, 2, 3);
        ctx.fillRect(px + (player.facingRight ? 28 : 26), py + 15, 2, 3);
        
        // Attack effect
        if (player.isAttacking) {
            ctx.fillStyle = player.attackType === 'punch' ? '#ffaa44' : '#ff6644';
            ctx.fillRect(px + 35 + (player.facingRight ? 5 : -25), py + 28, 20, 12);
        }
        
        ctx.globalAlpha = 1;
    }

    // Classic Nightwing (black suit, blue bird symbol, moves!)
    function drawNightwing() {
        if (currentSidekickLevel !== 3 || !nightwing.active) return;
        const nx = nightwing.x;
        const ny = nightwing.y;
        
        // Shadow
        ctx.fillStyle = '#00000033';
        ctx.fillRect(nx + 5, ny + 45, 30, 5);
        
        // Body (black)
        ctx.fillStyle = '#111111';
        ctx.fillRect(nx + 8, ny + 22, 28, 24);
        
        // Blue bird symbol
        ctx.fillStyle = '#44aaff';
        ctx.beginPath();
        ctx.moveTo(nx + 22, ny + 30);
        ctx.lineTo(nx + 19, ny + 34);
        ctx.lineTo(nx + 22, ny + 33);
        ctx.lineTo(nx + 25, ny + 34);
        ctx.fill();
        
        // Head
        ctx.fillStyle = '#222222';
        ctx.fillRect(nx + 12, ny + 8, 20, 16);
        
        // Domino mask (blue)
        ctx.fillStyle = '#44aaff';
        ctx.fillRect(nx + 14, ny + 13, 16, 5);
        
        // Eyes
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(nx + 16, ny + 14, 4, 3);
        ctx.fillRect(nx + 24, ny + 14, 4, 3);
        
        // Attack animation
        if (nightwing.attackTimer > 0) {
            ctx.fillStyle = '#44aaff';
            ctx.fillRect(nx + 35, ny + 28, 18, 10);
        }
    }

    // Classic Villain
    function drawVillain() {
        const vx = villain.x;
        const vy = villain.y;
        
        // Health bar
        const percent = currentVillainHealth / currentVillainMaxHealth;
        ctx.fillStyle = '#330000';
        ctx.fillRect(vx + 5, vy - 18, 70, 8);
        ctx.fillStyle = '#cc0000';
        ctx.fillRect(vx + 5, vy - 18, 70 * percent, 8);
        
        ctx.fillStyle = '#ffd700';
        ctx.font = "bold 8px monospace";
        ctx.fillText(currentLevelData.villain, vx + 20, vy - 22);
        
        // Body
        ctx.fillStyle = currentLevelData.color;
        ctx.fillRect(vx + 8, vy + 18, 36, 28);
        
        // Head
        ctx.fillRect(vx + 12, vy + 4, 28, 18);
        
        // Eyes
        ctx.fillStyle = currentLevelData.eyeColor;
        ctx.fillRect(vx + 18, vy + 10, 6, 5);
        ctx.fillRect(vx + 28, vy + 10, 6, 5);
        
        ctx.fillStyle = '#000000';
        ctx.fillRect(vx + 20 + (Math.sin(frame * 0.1) * 1), vy + 11, 2, 3);

        ctx.fillStyle = '#440000';
        ctx.fillRect(vx + 20, vy + 18, 12, 4);
        
        // Emoji
        ctx.font = "24px monospace";
        ctx.fillStyle = '#ffffff';
        ctx.fillText(currentLevelData.emoji, vx + 12, vy - 5);

            ctx.fillStyle = 'rgba(255,50,50,0.4)';
            ctx.fillRect(vx - 10, vy - 10, 70, 70);
        }
    }

    function drawSidekickIcon() {
        if (currentSidekickLevel === 1) {
            ctx.font = "28px monospace";
            ctx.fillStyle = '#44ff44';
            ctx.fillText('🤸', 20, canvas.height - 40);
            ctx.fillStyle = '#ffd700';
            ctx.font = "8px monospace";
            ctx.fillText('ROBIN', 50, canvas.height - 35);
        } else if (currentSidekickLevel === 2) {
            ctx.font = "28px monospace";
            ctx.fillStyle = '#ff69b4';
            ctx.fillText('🦸‍♀️', 20, canvas.height - 40);
            ctx.fillStyle = '#ffd700';
            ctx.font = "8px monospace";
            ctx.fillText('BATGIRL', 50, canvas.height - 35);
        }
        
        // Cooldown bar for sidekick
        if (sidekickCooldown > 0 && currentSidekickLevel > 0 && currentSidekickLevel < 3) {
            ctx.fillStyle = '#333366';
            ctx.fillRect(20, canvas.height - 50, 80, 5);
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(20, canvas.height - 50, 80 * (1 - sidekickCooldown/60), 5);
        }
    }

    function drawHealthBars() {
        ctx.fillStyle = '#330000';
        ctx.fillRect(20, 25, 200, 16);
        ctx.fillStyle = '#00cc44';
        ctx.fillRect(20, 25, 200 * (player.health / player.maxHealth), 16);
        ctx.fillStyle = '#ffffff';
        ctx.font = "bold 9px monospace";
        ctx.fillText("BATMAN", 25, 37);
        
        if (damageFlash > 0) {
            ctx.fillStyle = 'rgba(255,0,0,0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    function drawFloatingTexts() {
        for (let ft of floatingTexts) {
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = ft.color;
            ctx.fillText(ft.text, ft.x, ft.y);
            ft.y -= 1;
            ft.life--;
        }
        floatingTexts = floatingTexts.filter(ft => ft.life > 0);
    }
